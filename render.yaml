# Render 단일 Web Service: Express(server/)가 프론트 빌드(dist/)도 함께 서빙.
# 프론트+백엔드 같은 도메인 → 쿠키(SameSite=Lax)/CORS 문제 없음.
#
# 배포: Render → New → Blueprint(이 파일 사용) 또는 New → Web Service 에서 아래 값 수동 입력.
services:
  - type: web
    name: linkus20-agent-editor
    runtime: node
    plan: free
    # 루트 프론트 빌드 → 서버 빌드.
    buildCommand: npm install && npm run build && cd server && npm install && npm run build
    # 시작은 레포 루트에서 실행됨.
    startCommand: node server/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # 세션 서명 키 — Render 가 자동 생성.
      - key: SESSION_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      # ── 실제 GitHub Copilot 연동 시에만 채운다(mock 배포면 불필요) ──
      # 1) 프론트도 VITE_USE_MOCK=false 로 빌드해야 백엔드를 실제 호출함.
      # 2) GitHub OAuth App callback URL = https://<이 서비스 도메인>/api/auth/github/callback
      # - key: GITHUB_CLIENT_ID
      #   sync: false
      # - key: GITHUB_CLIENT_SECRET
      #   sync: false
      # - key: GITHUB_CALLBACK_URL
      #   sync: false
